<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f3f0ea; font-family: "Inter", system-ui, sans-serif; }
  /* General Sans not available — use Inter as the geometric fallback. Kept the font-stack so it picks up if installed locally. */
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="site-data.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="direction-1.jsx"></script>
<script type="text/babel" src="direction-2.jsx"></script>
<script type="text/babel" src="direction-3.jsx"></script>

<script type="text/babel" data-presets="react">
const App = () => {
  const { DesignCanvas, DCSection, DCArtboard } = window;
  return (
    <DesignCanvas title="Cedric Lim — Personal Website" subtitle="3 directions · midnight blue + warm copper · drop into github pages">
      <DCSection id="overview" title="Three directions to compare">
        <DCArtboard id="d1" label="A · Editorial Minimal" width={960} height={1500}>
          <window.D1 />
        </DCArtboard>
        <DCArtboard id="d2" label="B · Modern Grid" width={1200} height={1600}>
          <window.D2 />
        </DCArtboard>
        <DCArtboard id="d3" label="C · Dense Index (dark)" width={880} height={1700}>
          <window.D3 />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
