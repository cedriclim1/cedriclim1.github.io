<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cedric Lim — Personal Website (Preview)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1a1f2e; color: #e9ecf3;
    font-family: "JetBrains Mono", ui-monospace, monospace; }
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 44px;
    background: #0a1226; border-bottom: 1px solid #1f2c4a;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; font-size: 12px; z-index: 10;
  }
  .topbar .left { display: flex; align-items: center; gap: 12px; color: #8893ad; }
  .topbar .left b { color: #e9ecf3; font-weight: 500; }
  .pages { display: flex; gap: 4px; }
  .pages a {
    padding: 5px 10px; border-radius: 4px; color: #8893ad; text-decoration: none;
    font-size: 11px; border: 1px solid transparent;
  }
  .pages a:hover { color: #e9ecf3; border-color: #1f2c4a; }
  .pages a.active { background: #1f2c4a; color: #e9ecf3; }
  .open-new {
    color: #d49063; text-decoration: none; font-size: 11px;
    padding: 5px 10px; border: 1px solid #d49063; border-radius: 4px;
  }
  iframe {
    position: absolute; top: 44px; left: 0; right: 0; bottom: 0;
    width: 100%; height: calc(100% - 44px); border: 0; background: #fff;
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="left">
    <b>cedriclim1.github.io</b>
    <span>preview</span>
  </div>
  <div class="pages">
    <a href="#index.html" class="active">Home</a>
    <a href="#about.html">About</a>
    <a href="#cv.html">CV</a>
    <a href="#work.html">Work</a>
    <a href="#writing.html">Writing</a>
    <a href="#notes.html?doc=notes-c.md">↳ Notes on C</a>
    <a href="#post-phd-dataflow.html">↳ post 1</a>
    <a href="#post-physics-priors.html">↳ post 2</a>
  </div>
  <a class="open-new" href="site/index.html" target="_blank">open in new tab ↗</a>
</div>
<iframe id="frame" src="site/index.html"></iframe>

<script>
  const frame = document.getElementById("frame");
  const links = document.querySelectorAll(".pages a");
  function setPage(hash) {
    const page = (hash || "#index.html").replace("#", "");
    frame.src = "site/" + page;
    links.forEach(a => a.classList.toggle("active", a.getAttribute("href") === "#" + page));
  }
  links.forEach(a => a.addEventListener("click", e => {
    e.preventDefault();
    location.hash = a.getAttribute("href").slice(1);
    setPage(location.hash);
  }));
  window.addEventListener("hashchange", () => setPage(location.hash));
  if (location.hash) setPage(location.hash);
</script>
</body>
</html>
